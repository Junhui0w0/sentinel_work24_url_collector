name: Weekly Web Scraper(Work24_고용노동부)

on:
  schedule:
    - cron: '50 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v3

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 스크래핑 파이썬 코드 실행
        run: python work24.py

      - name: 새로 생성된 HTML 파일 자동 커밋 & 푸시
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "웹 스크래핑 결과 업데이트"
          file_pattern: "index.html"
