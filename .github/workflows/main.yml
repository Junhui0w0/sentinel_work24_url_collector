name: Weekly Web Scraper(Work24_고용노동부)

on:
  schedule:
    # GitHub Actions의 cron은 부정확하므로 30분~1시간 간격 권장
    # 15분마다 실행하려면 외부 서비스(GitHub App, 클라우드 함수 등) 필요
    - cron: '*/30 * * * *'  # 30분마다 실행 (더 안정적)
  workflow_dispatch:  # 수동 실행 가능
  push:
    branches: [ main, master ]  # 코드 푸시 시에도 실행

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v3

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 스크래핑 파이썬 코드 실행
        run: python work24.py

      - name: 새로 생성된 HTML 파일 자동 커밋 & 푸시
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "웹 스크래핑 결과 업데이트"
          file_pattern: "index.html"
